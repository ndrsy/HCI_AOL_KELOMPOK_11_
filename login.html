<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Univexus | Sign In</title>

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="login-wrapper">

        <!-- LEFT SIDE -->

        <div class="login-left">

            <div class="logo"
                 style="color:white; margin-bottom:40px;">

                <i class="fa-solid fa-graduation-cap"></i>

                UNIV<span style="color:#C5A880;">EXUS</span>

            </div>

            <h1>
                Your Future Starts Here.
            </h1>

            <p style="
                font-size:18px;
                margin-top:20px;
                margin-bottom:40px;
                opacity:.9;
            ">

                Explore universities, compare programs,
                discover scholarships, and make informed
                decisions about your academic future.

            </p>

            <img src="images/login-campus.jpg"
                 alt="Campus Students"
                 style="
                 border-radius:24px;
                 box-shadow:0 20px 40px rgba(0,0,0,.2);
                 ">

        </div>

        <!-- RIGHT SIDE -->

        <div class="login-right">

            <div class="auth-card">

                <h2>
                    Welcome Back
                </h2>

                <p style="
                    color:var(--text-muted);
                    margin-bottom:25px;
                ">

                    Sign in to continue your university journey.

                </p>

                <!-- LOGIN FORM -->

                <form id="loginForm">

                    <div class="form-group">

                        <label>Email Address</label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Password</label>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <div style="
                        display:flex;
                        justify-content:space-between;
                        align-items:center;
                        margin-bottom:20px;
                        font-size:14px;
                    ">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="#"
                           style="
                           color:var(--primary-blue);
                           font-weight:600;
                           ">

                            Forgot Password?

                        </a>

                    </div>

                    <button
                        type="submit"
                        class="btn-primary auth-btn">

                        <i class="fa-solid fa-right-to-bracket"></i>

                        Sign In

                    </button>

                </form>

                <!-- LOGIN MESSAGE -->

                <div id="loginMessage"
                     style="
                     text-align:center;
                     margin-top:15px;
                     font-weight:600;
                     min-height:24px;
                     ">
                </div>

                <!-- DIVIDER -->

                <div style="
                    text-align:center;
                    margin:25px 0;
                    color:#999;
                ">

                    OR

                </div>

                <!-- GOOGLE BUTTON -->

                <button
                    class="btn-secondary auth-btn"
                    style="width:100%;">

                    <i class="fa-brands fa-google"></i>

                    Continue With Google

                </button>

                <!-- REGISTER -->

                <div class="auth-footer">

                    Don't have an account?

                    <a href="register.html">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
