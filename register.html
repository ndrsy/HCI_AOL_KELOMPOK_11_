<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Univexus | Create Account</title>

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="login-wrapper">

        <!-- LEFT PANEL -->

        <div class="login-left">

            <div class="logo"
                 style="color:white; margin-bottom:40px;">

                <i class="fa-solid fa-graduation-cap"></i>

                UNIV<span style="color:#C5A880;">
                    EXUS
                </span>

            </div>

            <h1>

                Start Your
                Academic Journey.

            </h1>

            <p style="
                font-size:18px;
                margin-top:20px;
                margin-bottom:40px;
                opacity:.9;
            ">

                Join thousands of students using
                Univexus to discover universities,
                compare programs, explore scholarships,
                and build their future.

            </p>

            <img src="images/login-campus.jpg"
                 alt="Students"
                 style="
                 border-radius:24px;
                 box-shadow:0 20px 40px rgba(0,0,0,.2);
                 ">

        </div>

        <!-- RIGHT PANEL -->

        <div class="login-right">

            <div class="auth-card">

                <h2>

                    Create Account

                </h2>

                <p style="
                    color:var(--text-muted);
                    margin-bottom:25px;
                ">

                    Create your free Univexus account.

                </p>

                <form id="registerForm">

                    <!-- FIRST NAME -->

                    <div class="form-group">

                        <label>

                            First Name

                        </label>

                        <input
                             type="text"
                             id="fullName"
                                placeholder="Full Name"
                             required>

                    </div>

                    <!-- LAST NAME -->

                    <div class="form-group">

                        <label>

                            Last Name

                        </label>

                        <input
                            type="text"
                            id="lastName"
                            placeholder="Enter last name"
                            required>

                    </div>

                    <!-- EMAIL -->

                    <div class="form-group">

                        <label>

                            Email Address

                        </label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter email address"
                            required>

                    </div>

                    <!-- PASSWORD -->

                    <div class="form-group">

                        <label>

                            Password

                        </label>

                        <input
                            type="password"
                            id="password"
                            placeholder="Create password"
                            required>

                    </div>

                    <!-- CONFIRM PASSWORD -->

                    <div class="form-group">

                        <label>

                            Confirm Password

                        </label>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn-primary auth-btn">

                        <i class="fa-solid fa-user-plus"></i>

                        Create Account

                    </button>

                </form>

                <!-- MESSAGE -->

                <div id="registerMessage"
                     style="
                     text-align:center;
                     margin-top:15px;
                     font-weight:600;
                     min-height:24px;
                     ">
                </div>

                <!-- DIVIDER -->

                <div style="
                    text-align:center;
                    margin:25px 0;
                    color:#999;
                ">

                    OR

                </div>

                <!-- GOOGLE -->

                <button
                    class="btn-secondary auth-btn"
                    style="width:100%;">

                    <i class="fa-brands fa-google"></i>

                    Sign Up With Google

                </button>

                <!-- LOGIN LINK -->

                <div class="auth-footer">

                    Already have an account?

                    <a href="login.html">

                        Sign In

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- REGISTER SCRIPT -->

    <script src="js/register.js"></script>

</body>

</html>
